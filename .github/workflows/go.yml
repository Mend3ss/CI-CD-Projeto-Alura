# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  ci:
    runs-on: ubuntu-latest
    steps:
# Acessa nossos arquivos do repositorio e os utiliza para buildar
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Inicia o banco
      run: docker compose up -d postgres

    - name: Executa o Lint para analise do codigo
      run: docker run --rm -v $(pwd):/app -w /app golangci/golangci-lint:v2.11.4 golangci-lint run
#Busca pelas variaveis do banco em outro lugar, como o GitHub Secrets
    - name: teste
      run: DB_HOST={{secrets.DB_HOST}} DB_PASSWORD={{secrets.DB_PASSWORD}} DB_USER={{secrets.DB_USER}} DB_NAME={{secrets.DB_NAME}} DB_PORT={{secrets.DB_PORT}} go test -v main_test.go
